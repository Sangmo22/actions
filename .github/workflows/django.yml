name: Django Tests

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Notes app required tests
        run: |
          python manage.py test \
            notes.tests.NotesTestCase.test_notes_can_be_created \
            notes.tests.NotesTestCase.test_error_occurs_if_description_is_less_than_10_chars_long
