{% extends 'notes/base.html' %}
{% block title %}
    Add Note - XSS Vulnerable
{% endblock title %}
{% block content %}
    <style>
    .container {
        max-width: 600px;
        margin: 20px auto;
        padding: 20px;
    }
    
    .form-container {
        background-color: #fff;
        padding: 20px;
        border: 1px solid #ddd;
        border-radius: 5px;
    }
    
    .form-group {
        margin-bottom: 20px;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
    }
    
    .form-group input, .form-group textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-family: Arial, sans-serif;
        box-sizing: border-box;
    }
    
    .submit-btn {
        background-color: #dc3545;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
    }
    
    .submit-btn:hover {
        background-color: #c82333;
    }
    
    .back-link {
        display: inline-block;
        margin-bottom: 20px;
        padding: 10px 15px;
        background-color: #007bff;
        color: white;
        text-decoration: none;
        border-radius: 4px;
    }
    
    .back-link:hover {
        background-color: #0056b3;
    }
    </style>
    <div class="container">
        <a href="{% url 'security:xss-vulnerable' %}" class="back-link">← Back</a>
        <h1>Add Note (Vulnerable Form)</h1>
        <p>This form submits to a vulnerable endpoint.</p>
        <div class="form-container">
            <form action="{% url 'security:xss-add-vulnerable' %}" method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label for="title">Title:</label>
                    <input type="text" id="title" name="title" required>
                </div>
                <div class="form-group">
                    <label for="description">Description (minimum 10 characters):</label>
                    <textarea id="description" name="description" rows="5" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Submit</button>
            </form>
        </div>
    </div>
{% endblock content %}
